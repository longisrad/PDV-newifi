name: Build Padavan NEWIFI3 (Tự biên dịch Toolchain)

on:
  workflow_dispatch: # Cho phép chạy thủ công từ tab Actions
  push:
    branches:
      - main
      - master
    paths:
      - 'NEWIFI3.config' # Tự động chạy khi file config thay đổi

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: rt-n56u-src # Tải mã nguồn từ chính repo của bạn về thư mục tạm

      - name: Move repository to /opt/rt-n56u
        run: |
          sudo mkdir -p /opt/rt-n56u
          sudo chown -R runner:runner /opt/rt-n56u
          # Di chuyển toàn bộ mã nguồn của bạn sang thư mục /opt/rt-n56u để khớp đường dẫn hệ thống
          mv rt-n56u-src/* /opt/rt-n56u/ || true
          mv rt-n56u-src/.* /opt/rt-n56u/ 2>/dev/null || true

      - name: Initialize Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
            cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
            pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget libc-dev-bin
          
          # Thiết lập fakeroot-sysv làm mặc định (Sửa triệt để lỗi Connection refused của fakeroot-tcp)
          sudo update-alternatives --set fakeroot /usr/bin/fakeroot-sysv || true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false # Tắt cảnh báo cache

      - name: Prepare Config
        run: |
          # Copy cấu hình của bạn vào các file mẫu cấu hình tương ứng của Newifi 3
          cp -f /opt/rt-n56u/NEWIFI3.config /opt/rt-n56u/trunk/configs/templates/NEWIFI3.config || true
          cp -f /opt/rt-n56u/NEWIFI3.config /opt/rt-n56u/trunk/configs/templates/NEWIFI-D2.config || true
          cp -f /opt/rt-n56u/NEWIFI3.config /opt/rt-n56u/trunk/configs/templates/newifi3.config || true
          cp -f /opt/rt-n56u/NEWIFI3.config /opt/rt-n56u/trunk/.config

          # VÔ HIỆU HÓA CÁC DÒNG ÉP BUỘC CẤU HÌNH TRONG FILE build_firmware_modify CỦA BẠN:
          # 1. Thêm dấu # trước các dòng echo "CONFIG_FIRMWARE_... >> .config"
          sed -i 's/^[[:space:]]*echo "CONFIG_FIRMWARE_/# &/' /opt/rt-n56u/trunk/build_firmware_modify || true
          # 2. Thêm dấu # trước các dòng "sed -i" nhắm vào file ".config" để tránh sửa cấu hình ngoài ý muốn
          sed -i '/\.config/s/^[[:space:]]*sed -i/# &/' /opt/rt-n56u/trunk/build_firmware_modify || true

      - name: Build Toolchain from Source
        run: |
          cd /opt/rt-n56u/toolchain-mipsel
          
          # Tự động dò tìm file clean trong repo của bạn
          if [ -f "./clean_toolchain" ]; then
            ./clean_toolchain
          elif [ -f "./clean_sources" ]; then
            ./clean_sources
          else
            echo "Không tìm thấy file clean_toolchain hay clean_sources, bỏ qua..."
          fi
          
          # Tự động dò tìm file build toolchain trong repo của bạn
          if [ -f "./build_toolchain" ]; then
            ./build_toolchain
          elif [ -f "./build_toolchain_3.4.x" ]; then
            ./build_toolchain_3.4.x
          else
            echo "Không tìm thấy file build_toolchain hay build_toolchain_3.4.x!"
            exit 1
          fi

      - name: Build Firmware
        run: |
          cd /opt/rt-n56u/trunk
          ./clear_tree
          
          # Tự động dò tìm file build có sẵn trong repo của bạn để thực thi
          if [ -f "./build_firmware_modify" ]; then
            fakeroot ./build_firmware_modify NEWIFI3
          elif [ -f "./build_firmware" ]; then
            fakeroot ./build_firmware
          elif [ -f "./make_firmware" ]; then
            fakeroot ./make_firmware NEWIFI3
          else
            echo "Không tìm thấy file build_firmware_modify, build_firmware hay make_firmware trong repo của bạn!"
            exit 1
          fi

      - name: Prepare Release Artifacts
        id: prepare_files
        run: |
          echo "release_tag=NEWIFI3-$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
          echo "compile_date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Padavan-NEWIFI3-Firmware
          path: |
            /opt/rt-n56u/trunk/images/*.trx
            /opt/rt-n56u/trunk/images/*.md5

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: ${{ steps.prepare_files.outputs.release_tag }}
          name: NEWIFI3 Padavan Firmware [${{ steps.prepare_files.outputs.compile_date }}]
          body: |
            ### Padavan Firmware dành cho Newifi 3 (D2)
            - **Thời gian biên dịch:** `${{ steps.prepare_files.outputs.compile_date }}`
            - **Cấu hình sử dụng:** `NEWIFI3.config` từ repo của bạn.
            - **Trạng thái:** Toolchain được biên dịch tự động hoàn toàn từ đầu (from source).
            
            *Mã nguồn được biên dịch tự động bằng GitHub Actions từ repo của bạn.*
          files: |
            /opt/rt-n56u/trunk/images/*.trx
