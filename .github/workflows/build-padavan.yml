name: Build Padavan NEWIFI3

on:
  workflow_dispatch: # Cho phép chạy thủ công từ tab Actions
  push:
    branches:
      - main
      - master
    paths:
      - 'NEWIFI3.config' # Tự động chạy khi file config thay đổi

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: rt-n56u-src # Tải mã nguồn từ chính repo của bạn về thư mục tạm

      - name: Move repository to /opt/rt-n56u
        run: |
          sudo mkdir -p /opt/rt-n56u
          sudo chown -R runner:runner /opt/rt-n56u
          # Di chuyển toàn bộ mã nguồn chứa các tính năng tùy biến của bạn sang thư mục /opt/rt-n56u
          mv rt-n56u-src/* /opt/rt-n56u/ || true
          mv rt-n56u-src/.* /opt/rt-n56u/ 2>/dev/null || true

      - name: Initialize Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
            cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
            pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget libc-dev-bin
          
          # Khắc phục lỗi phân quyền fakeroot trên môi trường Ubuntu mới
          sudo update-alternatives --set fakeroot /usr/bin/fakeroot-tcp || true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Prepare Config
        run: |
          # Sao chép file cấu hình NEWIFI3.config của bạn vào đúng vị trí templates để chuẩn bị build
          cp -f /opt/rt-n56u/NEWIFI3.config /opt/rt-n56u/trunk/configs/templates/NEWIFI3.config
          cp -f /opt/rt-n56u/NEWIFI3.config /opt/rt-n56u/trunk/.config

      - name: Prepare Toolchain
        run: |
          cd /opt/rt-n56u/toolchain-mipsel
          if [ -f dl_toolchain.sh ]; then
            sh dl_toolchain.sh
          else
            echo "Không tìm thấy dl_toolchain.sh, tiến hành tải prebuilt toolchain..."
            mkdir -p toolchain-3.4.x
            wget -qO- https://github.com/hanwckf/padavan-toolchain/releases/download/v1.1/mipsel-linux-uclibc.tar.xz | tar -xJ -C toolchain-3.4.x
          fi

      - name: Build Firmware
        run: |
          cd /opt/rt-n56u/trunk
          ./clear_tree
          
          # Tự động dò tìm file build có sẵn trong repo của bạn để thực thi
          if [ -f "./build_firmware_modify" ]; then
            fakeroot ./build_firmware_modify NEWIFI3
          elif [ -f "./build_firmware" ]; then
            fakeroot ./build_firmware
          elif [ -f "./make_firmware" ]; then
            fakeroot ./make_firmware NEWIFI3
          else
            echo "Không tìm thấy file build_firmware_modify, build_firmware hay make_firmware trong repo của bạn!"
            exit 1
          fi

      - name: Prepare Release Artifacts
        id: prepare_files
        run: |
          echo "release_tag=NEWIFI3-$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
          echo "compile_date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Padavan-NEWIFI3-Firmware
          path: |
            /opt/rt-n56u/trunk/images/*.trx
            /opt/rt-n56u/trunk/images/*.md5

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: ${{ steps.prepare_files.outputs.release_tag }}
          name: NEWIFI3 Padavan Firmware [${{ steps.prepare_files.outputs.compile_date }}]
          body: |
            ### Padavan Firmware dành cho Newifi 3 (D2)
            - **Thời gian biên dịch:** `${{ steps.prepare_files.outputs.compile_date }}`
            - **Cấu hình sử dụng:** `NEWIFI3.config` từ repo của bạn.
            
            *Mã nguồn được biên dịch tự động bằng GitHub Actions từ repo của bạn.*
          files: |
            /opt/rt-n56u/trunk/images/*.trx
